services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "FinancePlatform_Dev1!"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./src/database:/docker-entrypoint-initdb
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost",
             "-U", "sa",
             "-P", "FinancePlatform_Dev1!",
             "-Q", "SELECT 1",
             "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./src/database:/scripts
    command: >
      /bin/bash -c "
      /opt/mssql-tools/bin/sqlcmd
      -S sqlserver -U sa -P FinancePlatform_Dev1!
      -i /scripts/01-schema.sql &&
      /opt/mssql-tools/bin/sqlcmd
      -S sqlserver -U sa -P FinancePlatform_Dev1!
      -i /scripts/02-seed-reference-data.sql &&
      /opt/mssql-tools/bin/sqlcmd
      -S sqlserver -U sa -P FinancePlatform_Dev1!
      -i /scripts/03-seed-transactions.sql
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: src/api/FinancePlatform.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver;Database=FinancePlatformDb;
        User Id=sa;Password=FinancePlatform_Dev1!;
        TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data: