name: API — Build & Push Image

# Runs after every merge to main that touches the API or this workflow file.
# Goal: produce a versioned Docker image in GitHub Container Registry (GHCR)
# that Azure (or any other deployment target) can pull.
#
# GHCR is free for public repos and free up to the Actions storage quota for
# private repos. No external registry account needed — it's tied to your
# GitHub account automatically.

on:
  push:
    branches:
      - main
    paths:
      - "src/api/**"
      - ".github/workflows/api-cd.yml"

env:
  # Image name format: ghcr.io/OWNER/REPO/IMAGE
  # github.repository is "pereiratc/finance-platform" automatically.
  # Lowercase is required by GHCR — the filter handles mixed-case repo names.
  IMAGE_NAME: ghcr.io/${{ github.repository }}/api

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    # These permissions are required to push to GHCR.
    # packages: write — allows the job to push images.
    # contents: read — allows checking out your code.
    # Without explicit permissions here, the job inherits repo defaults which
    # may not include package write access.
    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the code
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Docker Buildx
      #
      # Buildx is the modern Docker build driver. It supports BuildKit features
      # used in this workflow: cache-to/cache-from (layer caching), multi-
      # platform builds (not used here but available), and better error output.
      # The default Docker builder on GitHub runners doesn't support these.
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # 3. Log in to GitHub Container Registry
      #
      # GITHUB_TOKEN is automatically provided by Actions — no manual secret
      # setup needed. It's scoped to the repo and expires when the job ends.
      # -----------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 4. Extract metadata for image tags and labels
      #
      # docker/metadata-action generates tags and OCI-standard labels from
      # GitHub context. For a push to main, it produces:
      #
      #   ghcr.io/pereiratc/finance-platform/api:main
      #   ghcr.io/pereiratc/finance-platform/api:sha-a1b2c3d
      #
      # The SHA tag is the key one for traceability: every image is pinned to
      # the exact commit that produced it. If a bug ships, you can identify
      # which commit introduced it and roll back to the prior SHA.
      #
      # The 'main' tag floats — it always points to the most recent image from
      # main. Useful for "give me the latest" pull, but not for pinned deploys.
      # -----------------------------------------------------------------------
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      # -----------------------------------------------------------------------
      # 5. Build and push
      #
      # context: where Docker looks for the Dockerfile and source files.
      #          Set to the api directory so relative paths in the Dockerfile
      #          resolve correctly.
      # file: explicit path to the Dockerfile.
      # push: true — actually push to GHCR (as opposed to just building locally
      #       to verify the image builds, which you'd do with push: false).
      # tags: the tags generated by the metadata step above.
      # labels: OCI standard labels (source URL, revision SHA, etc.) embedded
      #         in the image manifest. Useful for auditing.
      #
      # cache-from / cache-to: Docker layer caching via GitHub Actions cache.
      # How it works: on the first run, every layer is built from scratch and
      # stored in the Actions cache. On the next run, Docker checks if a layer's
      # inputs have changed. If not, it pulls that layer from cache instead of
      # rebuilding. For a .NET API image, the restore layer (downloading NuGet
      # packages) is the expensive one — typically 60-90 seconds. Cached, it's
      # under 5 seconds.
      # -----------------------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          file: ./src/api/FinancePlatform.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # 6. Print image digest
      #
      # The digest is a content-addressed hash of the image manifest:
      # sha256:abc123... It uniquely identifies this exact image, independent of
      # tags (which can be moved). Logging it here means you have a permanent
      # record of what was pushed for this workflow run.
      # -----------------------------------------------------------------------
      - name: Print image digest
        run: echo "Image pushed with digest ${{ steps.build-and-push.outputs.digest }}"
